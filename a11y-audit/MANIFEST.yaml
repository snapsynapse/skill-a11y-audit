bundle: a11y-audit
bundle_version: 1
bundle_date: 2026-03-02
description: >
  Skill for running accessibility audits on web projects. Combines automated
  scanning (axe-core via Puppeteer, Lighthouse) with WCAG 2.1 AA compliance
  mapping, manual check guidance, markdown report generation, and optional
  GitHub Issue creation. Generic for any web project; project-specific
  standards configured via PAICE_CONTEXT.md.

compatibility:
  designed_for:
    platform: Anthropic Claude
    model: Claude Opus 4.6
    surface: Code
  tested_on: []
  spec_version: agentskills.io/1.0
  frontmatter_mode: claude

dependencies:
  - name: npm:axe-core
    note: >
      Injected into Puppeteer pages for WCAG violation detection via
      axe.run(). Install via: npm install axe-core
  - name: npm:puppeteer
    note: >
      Browser automation for loading pages and injecting axe-core.
      May already be installed. Install via: npm install puppeteer
  - name: lighthouse
    note: >
      CLI for accessibility scoring per page. Optional but recommended.
      Run via: npx lighthouse. Install globally: npm install -g lighthouse
  - name: gh
    note: >
      GitHub CLI for Issue creation and deduplication search (Phase 6
      only). Usually pre-installed. Install via: brew install gh

