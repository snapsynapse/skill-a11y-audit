bundle: a11y-audit
bundle_version: 2
bundle_date: 2026-03-03
description: >
  Skill for running accessibility audits on web projects. Combines automated
  scanning (axe-core via Puppeteer or Playwright, Lighthouse) with WCAG 2.1
  AA compliance mapping, manual check guidance, markdown report generation,
  and optional issue creation (GitHub, GitLab, Linear, Jira). Generic for
  any web project; project-specific standards configured via
  PROJECT_CONTEXT.md.

compatibility:
  designed_for:
    platform: Anthropic Claude
    model: Claude Opus 4.6
    surface: Code
  tested_on:
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Code
      status: pass
      date: 2026-03-03
      skill_version: 1
      notes: >
        Eval-1 against PAICE2 (3 pages). Lighthouse 93, axe-core 76
        violations (0 critical, 26 serious, 50 moderate), 5 unique rules.
        Full report generated with all sections.
  spec_version: agentskills.io/1.0
  frontmatter_mode: claude

dependencies:
  - name: npm:axe-core
    note: >
      Injected into Puppeteer/Playwright pages for WCAG violation
      detection via axe.run(). Install via: npm install axe-core
  - name: npm:puppeteer OR npm:playwright
    note: >
      Browser automation for loading pages and injecting axe-core.
      Use whichever the project already has. Install via:
      npm install puppeteer OR npm install playwright
  - name: lighthouse
    note: >
      CLI for accessibility scoring per page. Optional but recommended.
      Run via: npx lighthouse. Install globally: npm install -g lighthouse
  - name: gh (or equivalent tracker CLI)
    note: >
      Issue tracker CLI for Phase 6 issue creation. GitHub: gh.
      GitLab: glab. Linear: linear. Jira: go-jira. Only needed if
      Phase 6 is requested.

